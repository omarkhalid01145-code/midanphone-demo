
name: Sync Open Icecat phones

on:
  workflow_dispatch:
  schedule:
    - cron: "35 3 * * *"

permissions:
  contents: write

concurrency:
  group: sync-open-icecat
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build phone catalogue
        env:
          ICECAT_USERNAME: ${{ secrets.ICECAT_USERNAME }}
          ICECAT_API_TOKEN: ${{ secrets.ICECAT_API_TOKEN }}
          ICECAT_CONTENT_TOKEN: ${{ secrets.ICECAT_CONTENT_TOKEN }}
          MAX_PRODUCTS: "10000"
        run: python scripts/sync_icecat.py

      - name: Save catalogue update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/phones.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Open Icecat phone catalogue"
          git push
